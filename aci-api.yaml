apiVersion: '2021-10-01'
location: francecentral
name: forum-api
properties:
  containers:
  - name: forum-api
    properties:
      image: forumdiapason.azurecr.io/forum-api:latest
      ports:
      - port: 8081
        protocol: TCP
      resources:
        requests:
          cpu: 1.0
          memoryInGB: 1.0
      environmentVariables:
      - name: API_PORT
        value: "8081"
      - name: DB_FILE
        value: /app/data/forum.db
      - name: FRONTEND_ORIGIN
        value: https://forum.prettyflacko.fr
      - name: COOKIE_SECURE
        value: "false"
      - name: COOKIE_DOMAIN
        value: .prettyflacko.fr
      volumeMounts:
      - name: data
        mountPath: /app/data
      - name: public
        mountPath: /app/public
  osType: Linux
  restartPolicy: Always
  ipAddress:
    type: Public
    ports:
    - protocol: TCP
      port: 8081
    dnsNameLabel: forum-diapason-api
  imageRegistryCredentials:
  - server: forumdiapason.azurecr.io
    username: forumdiapason
    password: A2NvAxznIBtYKGnux7SiEbRuzAXhhAKT5bPFwLdRYSSsaBVyluKiJQQJ99CEAC5T7U2Eqg7NAAACAZCRDBQ4
  volumes:
  - name: data
    azureFile:
      shareName: forumdata
      storageAccountName: forumdiapasonstorage
      storageAccountKey: jshmfKyZVjVyTU+Q67OX/Xz/pPPavVX/YU9JJdZSAyJ1ib3zexC+De3j3PNJLz0lSPrXc641ZyRq+AStATP4gA==
  - name: public
