<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum Diapason - Forum Musical</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="brand">DIAPASON</div>
            <div class="search-wrap">
                <i class="fas fa-hashtag"></i>
                <input type="text" placeholder="#tag, #tag, #tag, etc...">
                <button class="icon-btn" aria-label="Filtrer">
                    <i class="fas fa-filter"></i>
                </button>
            </div>
            <nav class="nav">
                <a href="#" class="nav-link" data-page="login">Sign in</a>
                <a href="#" class="nav-link nav-link-dark" data-page="register">Register</a>
                <button class="icon-btn">
                    <i class="fas fa-bars"></i>
                </button>
            </nav>
            <div class="user-menu" id="userMenu" style="display: none;">
                <span id="userPseudo"></span>
                <button id="logoutBtn" class="btn btn-secondary">Déconnexion</button>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div id="homePage" class="page active">
                <div class="forum-layout">
                    <aside class="left-panel">
                        <div class="panel-title">CREER UN POST</div>
                        <form id="createPostForm" class="compact-form">
                            <input type="text" id="postTitle" placeholder="TITRE" required maxlength="200">
                            <textarea id="postContent" placeholder="DESCRIPTION" required maxlength="10000" rows="4"></textarea>
                            <input type="text" placeholder="TAG">
                            <div class="tag-list">
                                <span class="tag-pill">Tag <i class="fas fa-times"></i></span>
                                <span class="tag-pill">Tag <i class="fas fa-times"></i></span>
                                <span class="tag-pill">Tag <i class="fas fa-times"></i></span>
                                <span class="tag-pill">Tag <i class="fas fa-times"></i></span>
                            </div>
                            <div class="form-actions">
                                <button type="button" id="cancelPostBtn" class="btn btn-secondary">Cancel</button>
                                <button type="submit" id="createPostBtn" class="btn btn-primary">Post</button>
                            </div>
                        </form>
                    </aside>

                    <section class="feed-panel">
                        <div id="postsContainer" class="posts-container"></div>
                        <div id="loading" class="loading">Chargement...</div>
                        <button id="loadMoreBtn" class="btn btn-secondary" style="display: none;">Charger plus</button>
                    </section>

                    <aside class="right-panel">
                        <div class="panel-title">TOP POST</div>
                        <div id="topPostsContainer" class="top-posts"></div>
                    </aside>
                </div>
            </div>

            <div id="loginPage" class="page">
                <div class="auth-form">
                    <h2>Connexion</h2>
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="loginIdentifier">Email ou Pseudo</label>
                            <input type="text" id="loginIdentifier" required>
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Mot de passe</label>
                            <input type="password" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Se connecter</button>
                    </form>
                    <p class="auth-link">Pas encore de compte ? <a href="#" data-page="register">S'inscrire</a></p>
                </div>
            </div>

            <!-- Formulaire d'inscription -->
            <div id="registerPage" class="page">
                <div class="auth-form">
                    <h2>Inscription</h2>
                    <form id="registerForm">
                        <div class="form-group">
                            <label for="registerEmail">Email</label>
                            <input type="email" id="registerEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="registerPseudo">Pseudo</label>
                            <input type="text" id="registerPseudo" required>
                        </div>
                        <div class="form-group">
                            <label for="registerPassword">Mot de passe</label>
                            <input type="password" id="registerPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">S'inscrire</button>
                    </form>
                    <p class="auth-link">Déjà un compte ? <a href="#" data-page="login">Se connecter</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Forum Diapason. Tous droits réservés.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
