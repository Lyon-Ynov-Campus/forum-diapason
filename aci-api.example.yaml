apiVersion: '2021-10-01'
location: francecentral
name: forum-api
properties:
  containers:
  - name: forum-api
    properties:
      image: forumdiapason.azurecr.io/forum-api:latest
      ports:
      - port: 8081
        protocol: TCP
      resources:
        requests:
          cpu: 1.0
          memoryInGB: 1.0
      environmentVariables:
      - name: API_PORT
        value: "8081"
      - name: DB_FILE
        value: /app/data/forum.db
      - name: FRONTEND_ORIGIN
        value: https://forum.prettyflacko.fr
      - name: COOKIE_SECURE
        value: "false"
      - name: COOKIE_DOMAIN
        value: .prettyflacko.fr
      - name: SMTP_HOST
        value: smtp.gmail.com
      - name: SMTP_PORT
        value: "587"
      - name: SMTP_USER
        value: PLACEHOLDER_SMTP_USER
      - name: SMTP_PASS
        value: PLACEHOLDER_SMTP_PASS
      - name: SMTP_FROM
        value: PLACEHOLDER_SMTP_FROM
      volumeMounts:
      - name: data
        mountPath: /app/data
      - name: public
        mountPath: /app/public
  osType: Linux
  restartPolicy: Always
  ipAddress:
    type: Public
    ports:
    - protocol: TCP
      port: 8081
    dnsNameLabel: forum-diapason-api
  imageRegistryCredentials:
  - server: forumdiapason.azurecr.io
    username: PLACEHOLDER_ACR_USER
    password: PLACEHOLDER_ACR_PASS
  volumes:
  - name: data
    azureFile:
      shareName: forumdata
      storageAccountName: forumdiapasonstorage
      storageAccountKey: PLACEHOLDER_STORAGE_KEY
  - name: public
    azureFile:
      shareName: forumpublic
      storageAccountName: forumdiapasonstorage
      storageAccountKey: PLACEHOLDER_STORAGE_KEY
tags: {}
type: Microsoft.ContainerInstance/containerGroups
