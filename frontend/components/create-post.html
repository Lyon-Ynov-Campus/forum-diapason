{{define "create-post"}}
<aside class="sticky top-4 self-start border border-gray-200 rounded-lg p-4 flex flex-col gap-3 bg-white">

    <p class="font-bold text-sm tracking-wide">CRÉER UN POST</p>

    <input id="cp-titre" type="text" placeholder="Titre"
        class="border border-gray-200 rounded px-3 py-2 outline-none w-full placeholder:text-gray-400 text-sm focus:border-gray-500">
    <textarea id="cp-contenu" placeholder="Décris ton post..." rows="4"
        class="border border-gray-200 rounded px-3 py-2 outline-none w-full resize-none placeholder:text-gray-400 text-sm focus:border-gray-500"></textarea>

    <div>
        <p class="text-xs text-gray-500 mb-1.5">Tags suggérés</p>
        <div class="flex flex-wrap gap-1.5">
            <span class="cp-tag-preset cursor-pointer text-xs border border-gray-200 rounded-full px-2.5 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="jazz">jazz</span>
            <span class="cp-tag-preset cursor-pointer text-xs border border-gray-200 rounded-full px-2.5 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="rap">rap</span>
            <span class="cp-tag-preset cursor-pointer text-xs border border-gray-200 rounded-full px-2.5 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="rock">rock</span>
            <span class="cp-tag-preset cursor-pointer text-xs border border-gray-200 rounded-full px-2.5 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="classique">classique</span>
            <span class="cp-tag-preset cursor-pointer text-xs border border-gray-200 rounded-full px-2.5 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="electro">electro</span>
            <span class="cp-tag-preset cursor-pointer text-xs border border-gray-200 rounded-full px-2.5 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="rnb">rnb</span>
            <span class="cp-tag-preset cursor-pointer text-xs border border-gray-200 rounded-full px-2.5 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="vinyle">vinyle</span>
            <span class="cp-tag-preset cursor-pointer text-xs border border-gray-200 rounded-full px-2.5 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="album">album</span>
            <span class="cp-tag-preset cursor-pointer text-xs border border-gray-200 rounded-full px-2.5 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="instrument">instrument</span>
            <span class="cp-tag-preset cursor-pointer text-xs border border-gray-200 rounded-full px-2.5 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="production">production</span>
        </div>
    </div>

    <input id="cp-tag-input" type="text" placeholder="+ Autre tag (Entrée pour ajouter)"
        class="border border-gray-200 rounded px-3 py-1.5 outline-none w-full placeholder:text-gray-400 text-xs focus:border-gray-500">

    <div id="cp-tags" class="flex flex-wrap gap-1 empty:hidden"></div>

    <label class="border-2 border-dashed border-gray-200 rounded flex flex-col items-center justify-center h-24 cursor-pointer hover:bg-gray-50 hover:border-gray-300 gap-1 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <span id="cp-image-label" class="text-xs text-gray-400">Ajouter une image</span>
        <input id="cp-image" type="file" accept="image/*" class="hidden">
    </label>

    <p id="cp-error" class="text-xs text-red-500 hidden"></p>

    <div class="flex gap-2 mt-1">
        <button id="cp-cancel" class="flex-1 border border-gray-300 rounded py-1.5 text-sm hover:bg-gray-50">Annuler</button>
        <button id="cp-submit" class="flex-1 bg-black text-white rounded py-1.5 text-sm font-bold hover:bg-gray-800">Publier</button>
    </div>

</aside>
{{end}}
