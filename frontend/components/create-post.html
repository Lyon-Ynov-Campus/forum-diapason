{{define "create-post"}}
<aside class="sticky top-4 border border-gray-200 p-3 flex flex-col gap-2 bg-white text-xs self-start">

    <p class="font-bold text-xs">CREER UN POST</p>

    <input id="cp-titre" type="text" placeholder="TITRE"
        class="border border-gray-200 px-2 py-1 outline-none w-full placeholder:text-gray-400 text-xs">
    <textarea id="cp-contenu" placeholder="DESCRIPTION" rows="3"
        class="border border-gray-200 px-2 py-1 outline-none w-full resize-none placeholder:text-gray-400 text-xs"></textarea>

    <!-- Tags prédéfinis -->
    <div class="flex flex-wrap gap-1">
        <span class="cp-tag-preset cursor-pointer border border-gray-200 px-2 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="jazz">jazz</span>
        <span class="cp-tag-preset cursor-pointer border border-gray-200 px-2 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="rap">rap</span>
        <span class="cp-tag-preset cursor-pointer border border-gray-200 px-2 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="rock">rock</span>
        <span class="cp-tag-preset cursor-pointer border border-gray-200 px-2 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="classique">classique</span>
        <span class="cp-tag-preset cursor-pointer border border-gray-200 px-2 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="electro">electro</span>
        <span class="cp-tag-preset cursor-pointer border border-gray-200 px-2 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="rnb">rnb</span>
        <span class="cp-tag-preset cursor-pointer border border-gray-200 px-2 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="vinyle">vinyle</span>
        <span class="cp-tag-preset cursor-pointer border border-gray-200 px-2 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="album">album</span>
        <span class="cp-tag-preset cursor-pointer border border-gray-200 px-2 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="instrument">instrument</span>
        <span class="cp-tag-preset cursor-pointer border border-gray-200 px-2 py-0.5 hover:bg-black hover:text-white hover:border-black transition-colors" data-tag="production">production</span>
    </div>

    <!-- Image -->
    <label class="border border-gray-200 flex flex-col items-center justify-center h-20 cursor-pointer hover:bg-gray-50 gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <span id="cp-image-label" class="text-xs text-gray-400">Ajouter une image</span>
        <input id="cp-image" type="file" accept="image/*" class="hidden">
    </label>

    <!-- Tags sélectionnés -->
    <div id="cp-tags" class="flex flex-wrap gap-1 min-h-[20px]"></div>

    <!-- Tag personnalisé -->
    <input id="cp-tag-input" type="text" placeholder="Autre tag (Entrée pour ajouter)"
        class="border border-gray-200 px-2 py-1 outline-none w-full placeholder:text-gray-400 text-xs">

    <p id="cp-error" class="text-red-500 hidden"></p>

    <div class="flex gap-2 mt-1">
        <button id="cp-cancel" class="flex-1 border border-gray-300 py-1 hover:bg-gray-50">CANCEL</button>
        <button id="cp-submit" class="flex-1 bg-black text-white py-1 hover:bg-gray-800">POST</button>
    </div>

</aside>
{{end}}
