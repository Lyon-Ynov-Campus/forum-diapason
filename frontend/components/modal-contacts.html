{{define "modal-contacts"}}
<div id="modal-contacts" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">

    <div class="bg-white w-[480px] max-h-[80vh] flex flex-col">

        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-200">
            <h2 class="font-bold text-sm">Contacts</h2>
            <button id="modal-contacts-close" class="text-gray-400 hover:text-black text-xl leading-none">×</button>
        </div>

        <div class="px-5 py-3 border-b border-gray-200">
            <input id="contacts-search" type="text" placeholder="Rechercher un contact..."
                class="w-full border border-gray-200 px-3 py-2 text-sm outline-none focus:border-gray-400">
        </div>

        <div id="contacts-list" class="flex flex-col overflow-y-auto divide-y divide-gray-100"></div>

    </div>
</div>

<template id="contact-item">
    <div class="flex items-center justify-between px-5 py-3">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <span class="contact-pseudo font-bold text-sm uppercase"></span>
        </div>
        <div class="flex gap-2">
            <button class="contact-follow-btn bg-black text-white text-xs px-4 py-1.5 rounded-full hover:bg-gray-800">FOLLOW</button>
            <button class="contact-unfollow-btn border border-gray-300 text-xs px-4 py-1.5 rounded-full hover:bg-gray-50">UNFOLLOW</button>
        </div>
    </div>
</template>
{{end}}
