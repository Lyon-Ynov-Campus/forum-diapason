{{define "modal-edit-profile"}}
<!-- Overlay -->
<div id="modal-edit-profile" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">

    <div class="bg-white rounded-xl w-[480px] p-6 flex flex-col gap-5 relative">

        <div class="flex items-center justify-between">
            <h2 class="font-bold text-base">Modifier le profil</h2>
            <button id="modal-close-btn" class="text-gray-500 hover:text-black text-xl leading-none">×</button>
        </div>

        <div class="flex flex-col items-center gap-2">
            <div id="modal-avatar" class="w-20 h-20 rounded-full border border-gray-300 flex items-center justify-center text-gray-400 cursor-pointer hover:opacity-80">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <span class="text-sm text-gray-500">Changer la photo</span>
        </div>

        <div class="flex flex-col gap-4">
            <div class="flex flex-col gap-1">
                <label class="text-xs text-gray-600">Nom d'utilisateur</label>
                <input id="modal-pseudo" type="text" placeholder="Nom d'utilisateur"
                    class="border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-gray-500 w-full">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs text-gray-600">Ville</label>
                <input id="modal-ville" type="text" placeholder="Ville"
                    class="border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-gray-500 w-full">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs text-gray-600">Bio</label>
                <input id="modal-bio" type="text" placeholder="Bio"
                    class="border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-gray-500 w-full">
            </div>
        </div>

        <button id="modal-save-btn" class="bg-black text-white py-3 rounded text-sm font-bold hover:bg-gray-800 w-full">
            Enregistrer
        </button>

    </div>
</div>
{{end}}
