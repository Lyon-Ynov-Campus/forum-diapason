{{define "header"}}
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')</script>
<header class="border-b border-gray-200 px-6 py-4">
    <div class="flex items-center justify-between gap-6">

        <a href="/" class="text-2xl font-black shrink-0 hover:opacity-80 transition-opacity">DIAPASON</a>

        <div class="relative flex-1 max-w-xl">
            <div class="flex items-center border-2 border-black overflow-hidden">
                <div class="bg-black text-white p-2 m-1 shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                    </svg>
                </div>
                <input
                    id="search-input"
                    type="text"
                    placeholder="Rechercher des posts ou des utilisateurs..."
                    autocomplete="off"
                    class="flex-1 bg-gray-100 px-3 py-2 text-sm outline-none"
                >
                <button class="px-3 text-gray-500 hover:text-black">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
                    </svg>
                </button>
                <button data-open-filter class="px-3 text-gray-500 hover:text-black">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h18M7 10h10M11 16h2" />
                    </svg>
                </button>
            </div>
            <div id="search-suggestions" class="hidden absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 rounded shadow-lg z-40 max-h-80 overflow-y-auto"></div>
        </div>

        <nav class="flex items-center gap-3 shrink-0">
            {{if .User}}
                <a href="/profile?id={{.User.ID}}" class="text-sm text-gray-700 hover:text-black">{{.User.Pseudo}}</a>
                <form method="POST" action="/logout" class="m-0">
                    <button type="submit" class="px-4 py-2 bg-black text-white text-sm hover:bg-gray-800">Logout</button>
                </form>
            {{else}}
                <a href="/login" class="px-4 py-2 border border-gray-300 text-sm hover:bg-gray-50">Sign in</a>
                <a href="/register" class="px-4 py-2 bg-black text-white text-sm hover:bg-gray-800">Register</a>
            {{end}}
            <button id="theme-toggle" class="text-gray-700 hover:text-black p-1" aria-label="Basculer le thème">
                <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
                <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                </svg>
            </button>
            <button data-open-settings class="text-gray-700 hover:text-black p-1" aria-label="Paramètres">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </nav>

    </div>
</header>
{{end}}
