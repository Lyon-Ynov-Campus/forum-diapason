{{define "header"}}
<header class="border-b border-gray-200 px-6 py-4">
    <div class="flex items-center justify-between gap-6">

        <span class="text-2xl font-black shrink-0">DIAPASON</span>

        <div class="flex items-center border-2 border-black flex-1 max-w-xl overflow-hidden">
            <div class="bg-black text-white p-2 m-1 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                </svg>
            </div>
            <input
                type="text"
                placeholder="#tag, #tag, #tag, etc..."
                class="flex-1 bg-gray-100 px-3 py-2 text-sm outline-none"
            >
            <button class="px-3 text-gray-500 hover:text-black">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
                </svg>
            </button>
            <button class="px-3 text-gray-500 hover:text-black">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h18M7 10h10M11 16h2" />
                </svg>
            </button>
        </div>

        <nav class="flex items-center gap-3 shrink-0">
            {{if .User}}
                <a href="/profile" class="text-sm text-gray-700 hover:text-black">{{.User.Pseudo}}</a>
                <form method="POST" action="/logout" class="m-0">
                    <button type="submit" class="px-4 py-2 bg-black text-white text-sm hover:bg-gray-800">Logout</button>
                </form>
            {{else}}
                <a href="/login" class="px-4 py-2 border border-gray-300 text-sm hover:bg-gray-50">Sign in</a>
                <a href="/register" class="px-4 py-2 bg-black text-white text-sm hover:bg-gray-800">Register</a>
            {{end}}
            <button class="text-gray-700 hover:text-black">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </nav>

    </div>
</header>
{{end}}
