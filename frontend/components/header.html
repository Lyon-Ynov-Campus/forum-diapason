{{define "header"}}
<header class="border-b border-gray-200 px-6 py-4">
    <div class="flex items-center justify-between gap-6">

        <a href="/" class="text-2xl font-black shrink-0">DIAPASON</a>

        <div class="flex items-center border-2 border-black flex-1 max-w-xl overflow-hidden">
            <div class="bg-black text-white p-2 m-1 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                </svg>
            </div>
            <input type="text" placeholder="#tag, #tag, #tag, etc..."
                class="flex-1 bg-gray-100 px-3 py-2 text-sm outline-none">
        </div>

        <nav class="flex items-center gap-3 shrink-0">

            <!-- Boutons Sign in / Register (visibles si non connecté) -->
            <div id="nav-guest" class="flex items-center gap-3">
                <a href="/login"    class="px-4 py-2 border border-gray-300 text-sm hover:bg-gray-50">Sign in</a>
                <a href="/register" class="px-4 py-2 bg-black text-white text-sm hover:bg-gray-800">Register</a>
            </div>

            <!-- Menu utilisateur (visible si connecté) -->
            <!-- Remplacer le bloc nav-user par : -->
            <div id="nav-user" class="relative hidden">
                <button id="user-menu-btn" class="text-gray-700 hover:text-black p-1 border border-gray-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </button>

            <!-- Dropdown — hidden par défaut, right-0 pour rester dans l'écran -->
            <div id="user-menu-dropdown"
                class="hidden absolute right-0 top-full mt-1 w-48 border border-gray-200 bg-white shadow-md z-50">
                <a href="/" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 text-sm border-b border-gray-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    ACCUEIL
                </a>
                <a href="/profile" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 text-sm border-b border-gray-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    PROFILE
                </a>
                <a href="/friends" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 text-sm border-b border-gray-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    AMIS
                </a>
                <button id="logout-btn" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 text-sm w-full text-left text-red-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    LOG OUT
                </button>
            </div>
        </nav>
    </div>
</header>
{{end}}
