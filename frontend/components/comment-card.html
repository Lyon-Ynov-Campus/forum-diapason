{{define "comment-card"}}
<template id="comment-card">
    <div class="py-4 border-b border-dashed border-gray-200 last:border-0">

        <!-- Commentaire principal -->
        <div class="flex gap-3">
            <div class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <div class="flex-1">
                <p class="comment-author font-bold text-sm uppercase"></p>
                <p class="comment-content text-sm mt-0.5"></p>
                <p class="comment-date text-xs text-gray-400 italic mt-1"></p>
                <div class="flex items-center gap-3 mt-2 text-gray-400">
                    <button class="comment-like-btn flex items-center gap-1 hover:text-black text-xs">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 016.364 0L12 7.636l1.318-1.318a4.5 4.5 0 116.364 6.364L12 20.364l-7.682-7.682a4.5 4.5 0 010-6.364z" />
                        </svg>
                        <span class="comment-likes"></span>
                    </button>
                    <button class="comment-reply-btn flex items-center gap-1 hover:text-black text-xs">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" />
                        </svg>
                        Répondre
                    </button>
                </div>

                <!-- Formulaire de réponse (caché par défaut) -->
                <div class="comment-reply-form hidden mt-3 flex gap-2">
                    <input type="text" placeholder="Votre réponse..."
                        class="flex-1 border border-gray-200 px-3 py-1.5 text-xs outline-none focus:border-gray-400">
                    <button class="comment-reply-submit bg-black text-white text-xs px-3 py-1.5 hover:bg-gray-800">Envoyer</button>
                </div>
            </div>
        </div>

        <!-- Réponses -->
        <div class="comment-replies ml-11 mt-3 flex flex-col gap-3"></div>

    </div>
</template>

<template id="reply-card">
    <div class="flex gap-3 border-t border-dashed border-gray-200 pt-3">
        <div class="w-7 h-7 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </div>
        <div>
            <p class="reply-author font-bold text-xs uppercase"></p>
            <p class="reply-content text-xs mt-0.5"></p>
            <p class="reply-date text-xs text-gray-400 italic mt-1"></p>
        </div>
    </div>
</template>
{{end}}
