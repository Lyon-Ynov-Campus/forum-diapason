<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum Diapason - Forum Musical</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-music"></i>
                    <h1>Forum Diapason</h1>
                </div>
                <nav class="nav">
                    <a href="#" class="nav-link active" data-page="home">Accueil</a>
                    <a href="#" class="nav-link" data-page="login">Connexion</a>
                    <a href="#" class="nav-link" data-page="register">Inscription</a>
                </nav>
                <div class="user-menu" id="userMenu" style="display: none;">
                    <span id="userPseudo"></span>
                    <button id="logoutBtn" class="btn btn-secondary">Déconnexion</button>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- Page d'accueil -->
            <div id="homePage" class="page active">
                <div class="posts-header">
                    <h2>Publications récentes</h2>
                    <button id="createPostBtn" class="btn btn-primary" style="display: none;">
                        <i class="fas fa-plus"></i> Nouvelle publication
                    </button>
                </div>
                <div id="postsContainer" class="posts-container">
                    <!-- Les posts seront chargés ici -->
                </div>
                <div id="loading" class="loading">Chargement...</div>
                <button id="loadMoreBtn" class="btn btn-secondary" style="display: none;">Charger plus</button>
            </div>

            <!-- Formulaire de connexion -->
            <div id="loginPage" class="page">
                <div class="auth-form">
                    <h2>Connexion</h2>
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="loginIdentifier">Email ou Pseudo</label>
                            <input type="text" id="loginIdentifier" required>
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Mot de passe</label>
                            <input type="password" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Se connecter</button>
                    </form>
                    <p class="auth-link">Pas encore de compte ? <a href="#" data-page="register">S'inscrire</a></p>
                </div>
            </div>

            <!-- Formulaire d'inscription -->
            <div id="registerPage" class="page">
                <div class="auth-form">
                    <h2>Inscription</h2>
                    <form id="registerForm">
                        <div class="form-group">
                            <label for="registerEmail">Email</label>
                            <input type="email" id="registerEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="registerPseudo">Pseudo</label>
                            <input type="text" id="registerPseudo" required>
                        </div>
                        <div class="form-group">
                            <label for="registerPassword">Mot de passe</label>
                            <input type="password" id="registerPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">S'inscrire</button>
                    </form>
                    <p class="auth-link">Déjà un compte ? <a href="#" data-page="login">Se connecter</a></p>
                </div>
            </div>

            <!-- Formulaire de création de post -->
            <div id="createPostPage" class="page">
                <div class="post-form">
                    <h2>Nouvelle publication</h2>
                    <form id="createPostForm">
                        <div class="form-group">
                            <label for="postTitle">Titre</label>
                            <input type="text" id="postTitle" required maxlength="200">
                        </div>
                        <div class="form-group">
                            <label for="postContent">Contenu</label>
                            <textarea id="postContent" required maxlength="10000" rows="10"></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="button" id="cancelPostBtn" class="btn btn-secondary">Annuler</button>
                            <button type="submit" class="btn btn-primary">Publier</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Forum Diapason. Tous droits réservés.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
