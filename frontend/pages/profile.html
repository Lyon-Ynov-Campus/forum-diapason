<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil — Forum Diapason</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="flex flex-col min-h-screen">
    {{template "header" .}}
    {{template "menu-burger" .}}
    {{template "modal-edit-profile" .}}
    {{template "modal-contacts" .}}
    {{template "modal-filter" .}}
    {{template "post-card" .}}

    <main class="flex-1">

        <!-- Bannière -->
        <div class="relative bg-gray-100 h-44">
            <!-- Avatar -->
            <div class="absolute -bottom-10 left-8 w-20 h-20 rounded-full border-2 border-white bg-white flex items-center justify-center text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <!-- Cover placeholder -->
            <span class="absolute inset-0 flex items-center justify-center text-gray-400 text-sm">Cover photo placeholder</span>
            <button id="open-edit-profile-btn" class="absolute top-3 right-3 text-gray-500 hover:text-black">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
            </button>
        </div>

        <div class="px-8 pt-12 pb-6">
            <h1 id="profile-pseudo" class="text-xl font-bold"></h1>
            <p id="profile-ville" class="text-sm text-gray-500 flex items-center gap-1 mt-0.5">
                <span class="text-red-500">📍</span>
                <span></span>
            </p>

            <div class="flex items-center gap-3 mt-4">
                <div class="border border-gray-300 px-4 py-2 text-center">
                    <p id="profile-followers" class="font-bold text-sm"></p>
                    <p class="text-xs text-gray-400">Followers</p>
                </div>
                <div class="border border-gray-300 px-4 py-2 text-center">
                    <p id="profile-posts" class="font-bold text-sm"></p>
                    <p class="text-xs text-gray-400">Posts</p>
                </div>
                <button class="bg-black text-white text-sm px-5 py-2 hover:bg-gray-800">Follow</button>
                <button class="border border-gray-300 text-sm px-5 py-2 hover:bg-gray-50">Unfollow</button>
            </div>
        </div>

        <hr class="border-gray-200 mx-8">

        <div class="py-6 max-w-2xl mx-auto">
            <h2 class="text-sm font-bold mb-4">Posts</h2>
            <div id="profile-posts-container" class="flex flex-col gap-4"></div>
        </div>

    </main>

    {{template "footer" .}}
    <script src="/js/app.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
