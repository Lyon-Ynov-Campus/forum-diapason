<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post — Forum Diapason</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="flex flex-col min-h-screen">
    {{template "header" .}}
    {{template "menu-burger" .}}
    {{template "modal-edit-profile" .}}
    {{template "modal-contacts" .}}
    {{template "modal-filter" .}}
    {{template "comment-card" .}}

    <main class="flex-1 px-8 py-8">
        <div class="max-w-5xl mx-auto mb-4">
            <a href="/" class="flex items-center gap-2 text-sm text-gray-500 hover:text-black">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                Retour à l'accueil
            </a>
        </div>
        <div class="border border-blue-400 p-6 flex gap-6 max-w-5xl mx-auto">

            <div class="flex-1 border border-gray-200 p-5 flex flex-col gap-3">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-full border border-gray-200 flex items-center justify-center text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <span id="post-author" class="font-bold text-sm uppercase"></span>
                </div>

                <p id="post-title" class="font-bold text-sm"></p>
                <p id="post-content" class="text-sm text-gray-700"></p>

                <div class="bg-gray-100 flex items-center justify-center h-44">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>

                <div class="flex justify-between text-xs text-gray-400 italic">
                    <span id="post-date"></span>
                    <span id="post-tags"></span>
                </div>

                <div class="flex items-center gap-4 text-gray-400">
                    <button class="flex items-center gap-1 hover:text-black">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 016.364 0L12 7.636l1.318-1.318a4.5 4.5 0 116.364 6.364L12 20.364l-7.682-7.682a4.5 4.5 0 010-6.364z" />
                        </svg>
                        <span id="post-likes" class="text-xs"></span>
                    </button>
                    <button class="hover:text-black">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                        </svg>
                    </button>
                    <button class="hover:text-black">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                        </svg>
                    </button>
                </div>
            </div>

    
            <div class="w-72 shrink-0 border border-gray-200 flex flex-col">
                <div class="border-b border-gray-200 py-3 text-center">
                    <h2 class="font-bold text-xs tracking-widest">COMMENTAIRE</h2>
                </div>
                <div id="comments-list" class="flex-1 overflow-y-auto px-4 py-2"></div>
                <div class="border-t border-gray-200 p-3 flex gap-2">
                    <input id="new-comment-input" type="text" placeholder="Ajouter un commentaire..."
                        class="flex-1 border border-gray-200 px-3 py-1.5 text-xs outline-none focus:border-gray-400">
                    <button id="new-comment-submit" class="bg-black text-white text-xs px-3 py-1.5 hover:bg-gray-800">→</button>
                </div>
            </div>

        </div>
    </main>

    {{template "footer" .}}
    <script src="/js/app.js"></script>
    <script src="/js/post.js"></script>
</body>
</html>
