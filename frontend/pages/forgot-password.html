<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié — Forum Diapason</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="flex flex-col min-h-screen">
    {{template "header" .}}

    <main class="flex-1 flex items-center justify-center px-8">
        <form id="forgot-form" class="flex flex-col gap-5 w-80">

            <h1 class="text-xl font-bold">Mot de passe oublié</h1>
            <p class="text-sm text-gray-600">Saisis ton email, on t'envoie un lien pour réinitialiser ton mot de passe.</p>

            <div class="flex flex-col gap-1">
                <label class="text-sm text-gray-700" for="email">Email</label>
                <input id="email" name="email" type="email" required placeholder="ton@email.com"
                    class="border border-gray-300 px-4 py-3 text-sm outline-none focus:border-gray-500 w-full">
            </div>

            <p id="forgot-message" class="text-sm hidden"></p>

            <button type="submit" class="bg-black text-white py-3 text-sm hover:bg-gray-800 w-full">
                Envoyer le lien
            </button>

            <a href="/login" class="text-xs text-gray-500 hover:text-black text-center">← Retour à la connexion</a>
        </form>
    </main>

    {{template "footer" .}}
    <script src="/js/app.js"></script>
    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault()
            const email = document.getElementById('email').value
            const msg   = document.getElementById('forgot-message')
            try {
                const res = await fetch(`${API}/api/auth/forgot-password`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                })
                let data
                try {
                    data = await res.json()
                } catch (e) {
                    msg.textContent = 'Erreur serveur : impossible de traiter la réponse'
                    msg.classList.remove('hidden')
                    msg.classList.add('text-red-600')
                    return
                }
                msg.textContent = data.message || data.error || 'Erreur inconnue'
                msg.classList.remove('hidden')
                msg.classList.toggle('text-green-600', res.ok)
                msg.classList.toggle('text-red-600',  !res.ok)
            } catch (e) {
                msg.textContent = 'Erreur connexion : le serveur API n\'est pas accessible'
                msg.classList.remove('hidden')
                msg.classList.add('text-red-600')
            }
        })
    </script>
</body>
</html>
