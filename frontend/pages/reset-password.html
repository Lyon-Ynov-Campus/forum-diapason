<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe — Forum Diapason</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="flex flex-col min-h-screen">
    {{template "header" .}}

    <main class="flex-1 flex items-center justify-center px-8">
        <form id="reset-form" class="flex flex-col gap-5 w-80">

            <h1 class="text-xl font-bold">Nouveau mot de passe</h1>

            <div class="flex flex-col gap-1">
                <label class="text-sm text-gray-700" for="password">Mot de passe</label>
                <input id="password" type="password" required minlength="8" placeholder="8 caractères min"
                    class="border border-gray-300 px-4 py-3 text-sm outline-none focus:border-gray-500 w-full">
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-sm text-gray-700" for="password_confirm">Confirmer</label>
                <input id="password_confirm" type="password" required minlength="8" placeholder="Confirmer"
                    class="border border-gray-300 px-4 py-3 text-sm outline-none focus:border-gray-500 w-full">
            </div>

            <p id="reset-message" class="text-sm hidden"></p>

            <button type="submit" class="bg-black text-white py-3 text-sm hover:bg-gray-800 w-full">
                Réinitialiser
            </button>
        </form>
    </main>

    {{template "footer" .}}
    <script src="/js/app.js"></script>
    <script>
        const token = new URLSearchParams(location.search).get('token')

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault()
            const pw  = document.getElementById('password').value
            const pw2 = document.getElementById('password_confirm').value
            const msg = document.getElementById('reset-message')
            msg.classList.remove('hidden')
            if (pw !== pw2) {
                msg.textContent = 'Les mots de passe ne correspondent pas'
                msg.className = 'text-sm text-red-600'
                return
            }
            try {
                const res = await fetch(`${API}/api/auth/reset-password`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password: pw })
                })
                let data
                try {
                    data = await res.json()
                } catch (e) {
                    msg.textContent = 'Erreur serveur : impossible de traiter la réponse'
                    msg.className = 'text-sm text-red-600'
                    return
                }
                msg.textContent = data.message || data.error || 'Erreur inconnue'
                msg.className = 'text-sm ' + (res.ok ? 'text-green-600' : 'text-red-600')
                if (res.ok) setTimeout(() => window.location.href = '/login', 1500)
            } catch (e) {
                msg.textContent = 'Erreur connexion : le serveur API n\'est pas accessible'
                msg.className = 'text-sm text-red-600'
            }
        })
    </script>
</body>
</html>
